<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">My Task Manager</h1>
    <a href="/add" class="btn btn-primary mb-3">+ Add New Task</a>

    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ task }}
            <a href="/delete/{{ loop.index0 }}" class="btn btn-sm btn-danger">Delete</a>
        </li>
        {% else %}
        <li class="list-group-item text-muted">No tasks yet. Add one!</li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
